# Official and trusted source list for regulation monitoring
# The first automation version checks whether these pages changed and creates a daily report.

regulations:
  - name: RoHS
    keywords:
      - RoHS
      - restriction of hazardous substances
      - delegated directive
    sources:
      - title: European Commission - RoHS Directive
        url: https://environment.ec.europa.eu/topics/waste-and-recycling/rohs-directive_en
      - title: EUR-Lex search - RoHS
        url: https://eur-lex.europa.eu/search.html?scope=EURLEX&text=RoHS&lang=en&type=quick

  - name: EU Battery Regulation
    keywords:
      - Battery Regulation
      - batteries and waste batteries
      - Regulation (EU) 2023/1542
    sources:
      - title: European Commission - Batteries
        url: https://environment.ec.europa.eu/topics/waste-and-recycling/batteries_en
      - title: EUR-Lex - Regulation (EU) 2023/1542
        url: https://eur-lex.europa.eu/eli/reg/2023/1542/oj

  - name: CBAM
    keywords:
      - CBAM
      - Carbon Border Adjustment Mechanism
      - transitional registry
    sources:
      - title: European Commission - CBAM
        url: https://taxation-customs.ec.europa.eu/carbon-border-adjustment-mechanism_en
      - title: European Commission - CBAM guidance
        url: https://taxation-customs.ec.europa.eu/carbon-border-adjustment-mechanism/guidance_en

  - name: EU AI Act
    keywords:
      - AI Act
      - Artificial Intelligence Act
      - high-risk AI
    sources:
      - title: European Commission - AI Act
        url: https://digital-strategy.ec.europa.eu/en/policies/regulatory-framework-ai
      - title: EU AI Office
        url: https://digital-strategy.ec.europa.eu/en/policies/ai-office

  - name: Cyber Resilience Act
    keywords:
      - Cyber Resilience Act
      - CRA
      - products with digital elements
    sources:
      - title: European Commission - Cyber Resilience Act
        url: https://digital-strategy.ec.europa.eu/en/policies/cyber-resilience-act
      - title: EUR-Lex search - Cyber Resilience Act
        url: https://eur-lex.europa.eu/search.html?scope=EURLEX&text=%22Cyber%20Resilience%20Act%22&lang=en&type=quick
