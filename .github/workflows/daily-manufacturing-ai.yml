name: Daily Manufacturing AI Use Case Monitor

on:
  schedule:
    # 07:00 JST = 22:00 UTC on the previous day
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manufacturing-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run manufacturing AI monitor
        run: python manufacturing-ai/scripts/manufacturing_ai_monitor.py

      - name: Commit manufacturing AI report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manufacturing-ai/reports manufacturing-ai/state
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily manufacturing AI use case report"
            git push
          fi
