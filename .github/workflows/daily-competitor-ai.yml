name: Daily Shimadzu Competitor AI Trend Monitor

on:
  schedule:
    # 07:30 JST = 22:30 UTC on the previous day
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  competitor-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run competitor AI monitor
        run: python competitor-ai/scripts/competitor_ai_monitor.py

      - name: Commit competitor AI report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add competitor-ai/reports competitor-ai/state
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily competitor AI trend report"
            git push
          fi
