name: Daily AI Trend Monitor

on:
  schedule:
    # 06:45 JST = 21:45 UTC on the previous day
    - cron: "45 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ai-trends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run AI trend monitor
        run: python ai-trends/scripts/ai_monitor.py

      - name: Commit AI trend report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-trends/reports ai-trends/state
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily AI trend monitor report"
            git push
          fi
