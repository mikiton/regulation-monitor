name: Daily SAP PLM SCM Manufacturing DX Monitor

on:
  schedule:
    # 07:15 JST = 22:15 UTC on the previous day
    - cron: "15 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manufacturing-dx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run manufacturing DX monitor
        run: python manufacturing-dx/scripts/manufacturing_dx_monitor.py

      - name: Commit manufacturing DX report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manufacturing-dx/reports manufacturing-dx/state
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add daily manufacturing DX report"
            git push
          fi
